name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create (e.g. v0.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: version must be in the format vX.Y.Z (e.g. v0.3.0)"
            exit 1
          fi

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git tag --list "${{ inputs.version }}" | grep -q .; then
            echo "Tag ${{ inputs.version }} already exists, skipping"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}
