name: Android CI

on:
  push:
    paths:
      - 'android-keyboard/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths:
      - 'android-keyboard/**'
      - '.github/workflows/android-ci.yml'

jobs:
  core:
    name: Build & test :core (JVM only)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-keyboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build & test :core
        run: ./gradlew :core:test --stacktrace

  app:
    name: Assemble :app debug APK
    runs-on: ubuntu-latest
    needs: core
    defaults:
      run:
        working-directory: android-keyboard
    env:
      VOXTRAL_INCLUDE_APP: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: voxtral-voice-debug-apk
          path: android-keyboard/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
