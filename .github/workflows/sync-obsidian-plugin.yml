name: Sync Plugin to obsidian-voxtral

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create (e.g. 0.7.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (skip push to both repos)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  bump-and-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: obsidian-plugin
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: obsidian-plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bump version to ${{ inputs.version }}
        run: |
          node scripts/bump-version.mjs "${{ inputs.version }}"
          echo "Updated files:"
          git diff --stat

      - name: ESLint
        run: npx eslint src/

      - name: TypeScript check
        run: npx tsc -noEmit -skipLibCheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify version consistency
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          VERSIONS_HAS_KEY=$(node -p "!!require('./versions.json')['$MANIFEST_VERSION']")

          if [ "$MANIFEST_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::Version bump failed: manifest.json ($MANIFEST_VERSION) != input (${{ inputs.version }})"
            exit 1
          fi
          if [ "$MANIFEST_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Version mismatch: manifest.json ($MANIFEST_VERSION) != package.json ($PACKAGE_VERSION)"
            exit 1
          fi
          if [ "$VERSIONS_HAS_KEY" != "true" ]; then
            echo "::error::versions.json is missing entry for $MANIFEST_VERSION"
            exit 1
          fi
          echo "All versions consistent at $MANIFEST_VERSION ✓"

      - name: Commit version bump to source repo
        if: inputs.dry_run == false
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add obsidian-plugin/package.json obsidian-plugin/manifest.json obsidian-plugin/versions.json obsidian-plugin/main.js
          git commit -m "Release v${{ inputs.version }}"
          git push

      - name: Dry run — show version bump diff
        if: inputs.dry_run == true
        run: |
          echo "## Would bump version to ${{ inputs.version }}:"
          git diff

  sync:
    needs: bump-and-validate
    if: inputs.dry_run == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Re-checkout to get the version bump commit
          ref: ${{ github.ref }}
          path: source

      - name: Pull latest (includes version bump commit)
        working-directory: source
        run: git pull origin ${{ github.ref_name }}

      - name: Setup SSH for target repo
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.OBSIDIAN_VOXTRAL_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global core.sshCommand "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes"

      - name: Clone target repo
        run: git clone git@github.com:maxonamission/obsidian-voxtral.git target

      - name: Copy plugin files to target
        run: |
          # Copy build artifacts and config
          cp source/obsidian-plugin/main.js target/
          cp source/obsidian-plugin/manifest.json target/
          cp source/obsidian-plugin/styles.css target/
          cp source/obsidian-plugin/versions.json target/

          # Copy source and config for development
          cp source/obsidian-plugin/package.json target/
          cp source/obsidian-plugin/package-lock.json target/
          cp source/obsidian-plugin/tsconfig.json target/
          cp source/obsidian-plugin/esbuild.config.mjs target/
          cp source/obsidian-plugin/eslint.config.mjs target/
          cp -r source/obsidian-plugin/src target/

          # Copy docs
          cp source/obsidian-plugin/README.md target/ 2>/dev/null || true

          # Copy workflow for standalone releases
          mkdir -p target/.github/workflows
          cp source/obsidian-plugin/.github/workflows/release.yml target/.github/workflows/

      - name: Check for changes
        id: changes
        working-directory: target
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes to sync"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --cached --stat
          fi

      - name: Commit, tag, and push
        if: steps.changes.outputs.has_changes == 'true'
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "Sync plugin v${{ inputs.version }} from voxtral-transcribe"

          git tag "${{ inputs.version }}"

          git push origin main
          git push origin "${{ inputs.version }}"

          echo "::notice::Pushed v${{ inputs.version }} to obsidian-voxtral — release workflow will trigger automatically"
