name: Build & Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.7.0) — tag is created automatically if it does not exist'
        required: true
        type: string

permissions:
  contents: write

jobs:
  ensure-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          TAG="${{ inputs.version }}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in the format vX.Y.Z (e.g. v0.7.0)"
            exit 1
          fi

      - name: Create tag if needed
        id: resolve
        run: |
          TAG="${{ inputs.version }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping creation"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag $TAG"
          fi

  build-windows:
    needs: [ensure-tag]
    if: always() && (needs.ensure-tag.result == 'success' || needs.ensure-tag.result == 'skipped')
    runs-on: windows-latest
    env:
      BUILD_REF: ${{ needs.ensure-tag.outputs.tag || github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --name VoxtralTranscribe `
            --onedir `
            --windowed `
            --noconfirm `
            --clean `
            --add-data "static;static" `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import uvicorn.lifespan.off `
            --collect-all mistralai `
            --collect-all mistralai.client `
            --collect-all pystray `
            --collect-all PIL `
            server.py

      - name: Create launcher
        run: |
          @"
          @echo off
          cd /d "%~dp0"
          set VOXTRAL_NO_BROWSER=1
          start "" VoxtralTranscribe.exe
          timeout /t 2 /nobreak >nul
          start "" http://127.0.0.1:8000
          "@ | Out-File -Encoding ASCII "dist\VoxtralTranscribe\Start Voxtral Transcribe.bat"
        shell: pwsh

      - name: Copy .env.example
        run: copy .env.example dist\VoxtralTranscribe\ 2>nul || echo "No .env.example"

      - name: Copy README
        run: copy README-windows.txt dist\VoxtralTranscribe\README.txt 2>nul || echo "No README"

      - name: Zip artifact
        run: Compress-Archive -Path dist\VoxtralTranscribe\* -DestinationPath VoxtralTranscribe-windows.zip
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: VoxtralTranscribe-windows.zip

  build-macos:
    needs: [ensure-tag]
    if: always() && (needs.ensure-tag.result == 'success' || needs.ensure-tag.result == 'skipped')
    runs-on: macos-latest
    env:
      BUILD_REF: ${{ needs.ensure-tag.outputs.tag || github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name "Voxtral Transcribe" \
            --onedir \
            --noconfirm \
            --clean \
            --add-data "static:static" \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.lifespan.off \
            --collect-all mistralai \
            --collect-all mistralai.client \
            server.py

      - name: Copy .env.example
        run: cp .env.example "dist/Voxtral Transcribe/" 2>/dev/null || true

      - name: Copy README
        run: cp README-macos.txt "dist/Voxtral Transcribe/README.txt" 2>/dev/null || true

      - name: Zip artifact
        run: cd dist && zip -r ../VoxtralTranscribe-macos.zip "Voxtral Transcribe"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: VoxtralTranscribe-macos.zip

  build-linux:
    needs: [ensure-tag]
    if: always() && (needs.ensure-tag.result == 'success' || needs.ensure-tag.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      BUILD_REF: ${{ needs.ensure-tag.outputs.tag || github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --name voxtral-transcribe \
            --onedir \
            --noconfirm \
            --clean \
            --add-data "static:static" \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import uvicorn.lifespan.off \
            --collect-all mistralai \
            --collect-all mistralai.client \
            server.py

      - name: Copy .env.example
        run: cp .env.example dist/voxtral-transcribe/ 2>/dev/null || true

      - name: Copy README
        run: cp README-linux.txt dist/voxtral-transcribe/README.txt 2>/dev/null || true

      - name: Tar artifact
        run: cd dist && tar -czf ../VoxtralTranscribe-linux-x64.tar.gz voxtral-transcribe

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: VoxtralTranscribe-linux-x64.tar.gz

  build-rpi:
    needs: [ensure-tag]
    if: always() && (needs.ensure-tag.result == 'success' || needs.ensure-tag.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      BUILD_REF: ${{ needs.ensure-tag.outputs.tag || github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Build for Raspberry Pi (ARM64) via QEMU
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update -q
            apt-get install -y -q python3 python3-pip python3-venv
          run: |
            python3 -m venv /tmp/venv
            . /tmp/venv/bin/activate
            pip install -q -r requirements.txt
            pip install -q pyinstaller
            pyinstaller \
              --name voxtral-transcribe \
              --onedir \
              --noconfirm \
              --clean \
              --add-data "static:static" \
              --hidden-import uvicorn.logging \
              --hidden-import uvicorn.loops \
              --hidden-import uvicorn.loops.auto \
              --hidden-import uvicorn.protocols \
              --hidden-import uvicorn.protocols.http \
              --hidden-import uvicorn.protocols.http.auto \
              --hidden-import uvicorn.protocols.websockets \
              --hidden-import uvicorn.protocols.websockets.auto \
              --hidden-import uvicorn.lifespan \
              --hidden-import uvicorn.lifespan.on \
              --hidden-import uvicorn.lifespan.off \
              --collect-all mistralai \
              --collect-all mistralai.client \
              server.py
            cp .env.example dist/voxtral-transcribe/ 2>/dev/null || true
            cp README-rpi.txt dist/voxtral-transcribe/README.txt 2>/dev/null || true
            cd dist && tar -czf ../VoxtralTranscribe-linux-arm64-rpi.tar.gz voxtral-transcribe

      - uses: actions/upload-artifact@v4
        with:
          name: rpi-build
          path: VoxtralTranscribe-linux-arm64-rpi.tar.gz

  build-obsidian-plugin:
    needs: [ensure-tag]
    if: always() && (needs.ensure-tag.result == 'success' || needs.ensure-tag.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      BUILD_REF: ${{ needs.ensure-tag.outputs.tag || github.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}

      - name: Package Obsidian plugin
        run: |
          cd obsidian-plugin
          zip ../VoxtralTranscribe-obsidian-plugin.zip main.js manifest.json styles.css

      - uses: actions/upload-artifact@v4
        with:
          name: obsidian-plugin-build
          path: VoxtralTranscribe-obsidian-plugin.zip

  release:
    needs: [ensure-tag, build-windows, build-macos, build-linux, build-rpi, build-obsidian-plugin]
    if: always() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-tag.outputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            artifacts/VoxtralTranscribe-windows.zip
            artifacts/VoxtralTranscribe-macos.zip
            artifacts/VoxtralTranscribe-linux-x64.tar.gz
            artifacts/VoxtralTranscribe-linux-arm64-rpi.tar.gz
            artifacts/VoxtralTranscribe-obsidian-plugin.zip
