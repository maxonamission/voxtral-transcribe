name: Android Release

on:
  push:
    tags:
      - 'android-v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & publish signed Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-keyboard
    env:
      VOXTRAL_INCLUDE_APP: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - uses: gradle/actions/setup-gradle@v4

      - name: Derive version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF##*/}"             # android-vX.Y.Z
          VERSION="${TAG#android-v}"           # X.Y.Z
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/keys"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keys/release.jks"
          echo "VOXTRAL_KEYSTORE_PATH=$RUNNER_TEMP/keys/release.jks" >> "$GITHUB_ENV"

      - name: Assemble release APK
        env:
          VOXTRAL_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          VOXTRAL_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          VOXTRAL_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VOXTRAL_VERSION_NAME: ${{ steps.ver.outputs.version }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Generate checksums
        run: |
          cd app/build/outputs/apk/release
          sha256sum *.apk > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "Android v${{ steps.ver.outputs.version }}"
          generate_release_notes: true
          files: |
            android-keyboard/app/build/outputs/apk/release/*.apk
            android-keyboard/app/build/outputs/apk/release/SHA256SUMS
